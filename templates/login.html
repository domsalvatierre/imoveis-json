<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Imóveis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div class="d-flex justify-content-center align-items-center flex-grow-1">

    <div class="card p-4 shadow" style="width: 350px; border-radius: 15px;">
        <h3 class="text-center mb-3">Imóveis PMM/DPAT</h3>
        <h3 class="text-center mb-3">🔐 Login</h3>

        <form method="POST">
            <input type="text" name="ug" class="form-control mb-3" placeholder="UG" required>
            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" required>

            <button class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>

</div>

<footer class="text-center mb-3 text-light">
    <small>Developed by Charles Salvatierre</small>
</footer>

</body>
</html>
