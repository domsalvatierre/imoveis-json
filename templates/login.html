<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-3">🔐 Login</h3>

    <form method="POST">
        <input type="text" name="ug" class="form-control mb-3" placeholder="UG" required>
        <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" required>

        <button class="btn btn-light w-100">Entrar</button>
    </form>
</div>

</body>
</html>
